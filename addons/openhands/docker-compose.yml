version: '3.8'

services:
  openhands:
    image: ghcr.io/all-hands-ai/openhands:main
    container_name: openhands-app
    # 给予必要的权限以管理沙盒容器
    privileged: true
    ports:
      - "13000:3000"
    environment:
      # --- LLM 配置 ---
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-openai/gpt-4o}
      - LLM_BASE_URL=${OPENAI_API_BASE_URL}

      # --- 沙盒与权限配置 ---
      - WORKSPACE_BASE=${PWD}/workspace
      - FILE_STORE_PATH=/.openhands
      # 允许 Agent 执行 Git 操作
      - GIT_CREDENTIALS_HELPER=store

      # --- 进阶：如果你想自定义沙盒镜像 ---
      # 默认会拉取最新的 runtime 镜像，处理你的 JS 函数逻辑
      - SANDBOX_RUNTIME_CONTAINER_IMAGE=ghcr.io/all-hands-ai/runtime:main

    volumes:
      # 核心：允许 OpenHands 在宿主机上创建、销毁沙盒容器
      - /var/run/docker.sock:/var/run/docker.sock
      # 持久化 OpenHands 的内部状态（对话记录等）
      - openhands-state:/.openhands
      # 映射你的语义层项目目录
      - ./demo-workspace:/opt/workspace
    restart: unless-stopped

volumes:
  openhands-state: