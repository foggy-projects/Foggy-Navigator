spring:
  application:
    name: coding-agent

  datasource:
    url: jdbc:mysql://localhost:3306/foggy_navigator?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: foggy
    password: foggy_test_123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8112

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# Foggy Navigator 配置
foggy:
  coding-agent:
    # OpenHands 配置
    openhands:
      image: ghcr.io/all-hands-ai/openhands:main
      workspace-base: /workspace
      container-timeout: 1800  # 容器超时时间（秒）
      max-concurrent: 10       # 最大并发容器数

      # LLM 配置
      api-key: ${OPENAI_API_KEY}
      model-name: gpt-4
      api-base-url: ${OPENAI_API_BASE_URL:}

    # 验证服务配置
    validation:
      url: http://localhost:7108  # 验证服务地址（可配置）
      enabled: true
      realtime: true  # 实时验证

    # Git 配置
    git:
      default-branch: main
      auto-commit: true
      auto-pr: true

    # 会话恢复配置
    recovery:
      auto-recover-on-startup: false  # 应用启动时自动恢复会话

# 日志配置
logging:
  level:
    root: INFO
    com.foggy.navigator: DEBUG
    com.github.dockerjava: WARN
