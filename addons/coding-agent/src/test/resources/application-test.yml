spring:
  application:
    name: coding-agent-test

  # H2 Database configuration for testing
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

server:
  port: 0  # 随机端口

# JWT 配置
jwt:
  secret: test-jwt-secret-key-for-testing
  expiration: 86400

# ROOT 账号配置
system:
  root:
    username: root
    password: root123
    email: root@test.local

foggy:
  coding-agent:
    test-mode: true
    openhands:
      image: ghcr.io/all-hands-ai/openhands:main
      workspace-base: /tmp/test-workspace
      container-timeout: 120
      max-concurrent: 5
      api-key: ${OPENAI_API_KEY:test-key}
      model-name: gpt-4

    validation:
      url: http://localhost:7108
      enabled: false  # 集成测试中禁用验证服务
      realtime: false

    git:
      default-branch: main
      auto-commit: false
      auto-pr: false

logging:
  level:
    root: INFO
    com.foggy.navigator: DEBUG
    com.github.dockerjava: WARN
