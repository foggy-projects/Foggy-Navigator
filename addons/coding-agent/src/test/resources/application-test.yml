spring:
  application:
    name: coding-agent-test

server:
  port: 0  # 随机端口

foggy:
  coding-agent:
    test-mode: true
    openhands:
      image: ghcr.io/all-hands-ai/openhands:main
      workspace-base: /tmp/test-workspace
      container-timeout: 120
      max-concurrent: 5
      api-key: ${OPENAI_API_KEY:test-key}
      model-name: gpt-4

    validation:
      url: http://localhost:7108
      enabled: false  # 集成测试中禁用验证服务
      realtime: false

    git:
      default-branch: main
      auto-commit: false
      auto-pr: false

logging:
  level:
    root: INFO
    com.foggy.navigator: DEBUG
    com.github.dockerjava: WARN
