spring:
  application:
    name: metadata-config-module

  datasource:
    url: jdbc:mysql://localhost:13309/foggy_navigator?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update    # 自动建表/更新表结构
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8083

# JWT 配置
jwt:
  secret: foggy-navigator-jwt-secret-key-change-in-production
  expiration: 86400

# ROOT 账号配置
system:
  root:
    username: root
    password: root123
    email: root@foggy.local

# 日志配置
logging:
  level:
    com.foggy.navigator.metadata.config: DEBUG
    com.foggy.navigator.auth: DEBUG
