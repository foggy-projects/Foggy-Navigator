server:
  port: 8080

spring:
  application:
    name: tutor-agent

foggy:
  tutor-agent:
    coding-agent-base-url: http://localhost:8112
    default-tenant-id: default
    agent-id: tutor-agent
    init-skills-on-startup: true
    connect-timeout: 5000
    read-timeout: 30000

logging:
  level:
    com.foggy.navigator: DEBUG
    com.foggy.navigator.agent: DEBUG
    com.foggy.navigator.tutor: DEBUG
