spring:
  application:
    name: user-auth-module

  datasource:
    url: jdbc:mysql://localhost:13309/foggy_navigator?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    # 临时禁用Spring Security的默认行为，我们手动处理认证
    # 后续可以配置更细粒度的权限控制
    autoconfigure:
      exclude: org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

server:
  port: 8084

# JWT配置
jwt:
  secret: foggy-navigator-jwt-secret-key-change-in-production
  expiration: 86400  # 24小时（秒）

# ROOT 账号配置
system:
  root:
    username: root
    password: root123
    email: root@foggy.local

# 日志配置
logging:
  level:
    com.foggy.navigator.auth: DEBUG
