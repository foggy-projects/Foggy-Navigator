spring:
  application:
    name: foggy-navigator
  main:
    allow-bean-definition-overriding: true

  # SSE requires long-lived async requests; disable the default 30s timeout
  mvc:
    async:
      request-timeout: -1

  datasource:
    url: jdbc:mysql://localhost:13309/coding_agent?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: foggy
    password: foggy@123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 5
      connection-timeout: 20000       # 等待连接超时 20s（默认 30s）
      idle-timeout: 600000            # 空闲连接 10 分钟回收
      max-lifetime: 1800000           # 连接最大生命周期 30 分钟
      leak-detection-threshold: 60000 # 连接泄漏检测阈值 60s

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  # RabbitMQ 配置（监控事件总线）
  # 仅在 foggy.monitoring.enabled=true 时需要 RabbitMQ
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:foggy}
    password: ${RABBITMQ_PASS:foggy@monitor123}
    virtual-host: /
    listener:
      simple:
        missing-queues-fatal: false
        auto-startup: ${foggy.monitoring.enabled:false}

server:
  port: 8112
  # SSE requires long-lived async requests; disable the default 30s timeout
  servlet:
    async:
      timeout: -1
  tomcat:
    threads:
      max: 300          # 最大工作线程（默认 200）
      min-spare: 20     # 最小空闲线程，避免突发流量时创建延迟
    max-connections: 10000
    max-http-form-post-size: 30MB
    max-swallow-size: 30MB

# JWT 配置
jwt:
  secret: foggy-navigator-jwt-secret-key-change-in-production
  expiration: 86400

# ROOT 账号配置
system:
  root:
    username: root
    password: root123
    email: root@foggy.local

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,beans,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: foggy-navigator

# LLM 熔断器配置
agent:
  llm:
    circuit-breaker:
      failure-threshold: ${LLM_CB_FAILURE_THRESHOLD:5}
      cooldown-ms: ${LLM_CB_COOLDOWN_MS:30000}

# 凭证加密配置
navigator:
  security:
    credential-key: ${NAVIGATOR_CREDENTIAL_KEY:default-dev-key-change-in-prod}
    credential-salt: ${NAVIGATOR_CREDENTIAL_SALT:abcdef0123456789}

# Foggy Navigator 配置
foggy:
  navigator:
    business:
      agent:
        dev-sync-worker-url: ${BUSINESS_AGENT_DEV_SYNC_WORKER_URL:http://localhost:3061}
        dev-sync-worker-token: ${BUSINESS_AGENT_DEV_SYNC_WORKER_TOKEN:}
        upstreams:
          tms-x3-agent:
            url: ${TMS_X3_AGENT_UPSTREAM_URL:http://localhost:12580}
            user-token-header: ${TMS_X3_AGENT_USER_TOKEN_HEADER:X-TMS-Agent-Token}

# 日志配置
logging:
  level:
    root: INFO
    com.foggy.navigator: DEBUG
    com.github.dockerjava: WARN
  charset:
    file: UTF-8
    console: UTF-8
  file:
    name: logs/backend.log
    path: logs
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] [%X{sessionId}] [%X{agentId}] %-5level %logger{50} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] [%X{sessionId}] [%X{agentId}] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 1GB
