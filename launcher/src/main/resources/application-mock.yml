# Mock LLM 测试配置
# 使用方式: --spring.profiles.active=docker,mock

# Agent Framework LLM 配置 - 指向 Mock LLM Service
agent:
  llm:
    openai:
      api-key: mock-key
      base-url: http://localhost:8200/v1

# 覆盖 coding-agent 的 LLM 配置
foggy:
  coding-agent:
    openhands:
      api-key: mock-key
      api-base-url: http://localhost:8200/v1
      model-name: mock-model
