spring:
  application:
    name: metadata-query-module

server:
  port: 8082

# Foggy 框架配置
foggy:
  api:
    base-url: http://localhost:8080
  dataset:
    show-sql: true               # 打印 SQL（开发环境）
    sql-format: false            # SQL 格式化
    sql-log-level: DEBUG         # 日志级别
    show-sql-parameters: true    # 显示参数值
    show-execution-time: true    # 显示执行时间

# 日志配置
logging:
  level:
    com.foggy.navigator.metadata: DEBUG
    com.foggysource: DEBUG
