responses:
  - name: "biz-worker-skill-agent-submit"
    match:
      message_role: "tool"
      keywords: ["E_MOTOR_OVERHEAT", "breakdown"]
    response:
      content: "证据已收集，提交结构化 Skill 结果。"
      tool_calls:
        - id: "call_submit_result"
          type: "function"
          function:
            name: "submit_skill_result"
            arguments:
              summary: "Order diagnosed as vehicle_delay, recommend manual_dispatch (confidence: 92%)"
              structured_output:
                classification: "vehicle_delay"
                recommended_action: "manual_dispatch"
                confidence: 0.92
              evidence_refs:
                - "order:ORD-MOCK-LLM-001"
                - "vehicle:V09"

  - name: "biz-worker-skill-agent-get-vehicle"
    match:
      message_role: "tool"
      keywords: ["delay_minutes"]
    response:
      content: "继续读取车辆状态。"
      tool_calls:
        - id: "call_get_vehicle"
          type: "function"
          function:
            name: "mock_get_vehicle_status"
            arguments:
              vehicle_id: "V09"

  - name: "biz-worker-skill-agent-get-order"
    match:
      keywords: ["SKILL_AGENT_START exception_triage"]
    response:
      content: "先读取订单信息。"
      tool_calls:
        - id: "call_get_order"
          type: "function"
          function:
            name: "mock_get_order"
            arguments:
              order_id: "ORD-MOCK-LLM-001"

  - name: "biz-worker-skill-router-exception-triage"
    match:
      keywords: ["分析订单异常", "异常分诊", "exception triage"]
    response:
      content: "exception_triage"
