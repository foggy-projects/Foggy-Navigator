# Nginx reverse proxy for code-server behind frp
# Add this to your Nginx server block that handles port 5174
#
# Scenario: frp forwards traffic to Nginx on port 5174
#   /           → frontend (upstream localhost:5174 or static files)
#   /code/      → code-server (upstream localhost:18443)

# code-server reverse proxy
location /code/ {
    proxy_pass http://127.0.0.1:18443/;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Accept-Encoding gzip;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
