# Nginx reverse proxy for code-server behind frp
# Add this to your Nginx server block that handles port 5174
#
# Scenario: frp forwards traffic to Nginx on port 5174
#   /           → frontend (upstream localhost:5174 or static files)
#   /code/      → code-server (upstream localhost:18443 HTTP or 18444 HTTPS)
#
# NOTE: code-server's own HTTPS is handled by setup-https.sh (local nginx).
#       This config is for the *public-facing* nginx that routes /code/ path.
#       The public nginx terminates HTTPS and proxies to code-server's HTTP port.

# ============================================================
# Option 1: Proxy to code-server HTTP port (recommended for public nginx)
# ============================================================
# code-server reverse proxy (HTTP backend)
location /code/ {
    proxy_pass http://127.0.0.1:18443/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Accept-Encoding gzip;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# ============================================================
# Option 2: Proxy to code-server HTTPS port (if you need end-to-end encryption)
# ============================================================
# Uncomment below if you want the public nginx to proxy to code-server's HTTPS port.
# This provides end-to-end encryption but requires trusting the self-signed cert.
